# Test Scenario: Starblum Showcase
# =============================================================================
# Purpose: Readme/release screenshot data with realistic chore names, strong
# visual variety, and seeded progress for dashboard cards.
#
# Highlights:
#   - Starblum family with accent-rich names
#   - Roughly 8-9 visible chores per child through a mix of solo + shared work
#   - Rotation, shared-first, shared-all, due-window, overdue, and steal states
#   - Bronze / Silver / Gold cumulative badges + 2 periodic badges
#   - Seeded points and approvals so badges show earned + in-progress states
# =============================================================================

